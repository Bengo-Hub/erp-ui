<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" width="260" height="60">
  <defs>
    <linearGradient id="erp-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b2460"/>
      <stop offset="100%" style="stop-color:#5B1C4D"/>
    </linearGradient>
    <linearGradient id="erp-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f09030"/>
      <stop offset="100%" style="stop-color:#ea8022"/>
    </linearGradient>
  </defs>
  <!-- Icon: dashboard grid + CodeVertex V badge -->
  <g transform="translate(2, 6)">
    <!-- Dashboard grid blocks -->
    <rect x="0" y="2" width="18" height="18" rx="3" fill="url(#erp-grad)"/>
    <rect x="22" y="2" width="18" height="18" rx="3" fill="url(#erp-grad)" opacity="0.7"/>
    <rect x="0" y="24" width="18" height="18" rx="3" fill="url(#erp-grad)" opacity="0.7"/>
    <rect x="22" y="24" width="18" height="18" rx="3" fill="url(#erp-grad)" opacity="0.5"/>
    <!-- CodeVertex V badge (orange circle with V) -->
    <circle cx="36" cy="6" r="9" fill="url(#erp-accent)"/>
    <path d="M30 3 L36 11 L42 3" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- CodeVertex ERP text -->
  <text x="52" y="26" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold">
    <tspan fill="url(#erp-grad)">Code</tspan><tspan fill="url(#erp-accent)">Vertex</tspan>
  </text>
  <text x="52" y="46" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#6b7280" letter-spacing="3">
    ERP
  </text>
</svg>
