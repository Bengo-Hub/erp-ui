<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b2460"/>
      <stop offset="100%" style="stop-color:#5B1C4D"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f09030"/>
      <stop offset="100%" style="stop-color:#ea8022"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Dashboard grid blocks -->
  <g transform="translate(110, 100)">
    <rect x="0" y="0" width="120" height="100" rx="16" fill="#ffffff" opacity="0.95"/>
    <rect x="140" y="0" width="120" height="100" rx="16" fill="#ffffff" opacity="0.75"/>
    <rect x="0" y="120" width="120" height="100" rx="16" fill="#ffffff" opacity="0.75"/>
    <rect x="140" y="120" width="120" height="100" rx="16" fill="#ffffff" opacity="0.55"/>
  </g>
  <!-- CodeVertex V badge -->
  <g transform="translate(340, 108)">
    <circle cx="42" cy="42" r="42" fill="#ffffff"/>
    <circle cx="42" cy="42" r="36" fill="url(#accent)"/>
    <path d="M24 32 L42 56 L60 32" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- ERP text -->
  <text x="256" y="400" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="80" font-weight="bold" fill="#ffffff" letter-spacing="12">
    ERP
  </text>
  <text x="256" y="440" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#ffffff" opacity="0.6" letter-spacing="4">
    CODEVERTEX
  </text>
</svg>
