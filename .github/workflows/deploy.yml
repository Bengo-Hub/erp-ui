name: Build and Deploy ERP UI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Deployment secrets are stored in devops-k8s repo and synced here on demand.
# The sync-secrets job checks which secrets are missing and only requests those.
# GH_PAT must exist in THIS repo to authenticate cross-repo workflow triggers.

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.sync.outputs.result }}
    steps:
      - name: Check and sync missing secrets
        id: sync
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          # Map required secrets to detect empty values (gh secret list can't check values)
          _REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          _REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          _REGISTRY_EMAIL: ${{ secrets.REGISTRY_EMAIL }}
          _KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          _SSH_HOST: ${{ secrets.SSH_HOST }}
          _SSH_USER: ${{ secrets.SSH_USER }}
          _SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          _DOCKER_SSH_KEY: ${{ secrets.DOCKER_SSH_KEY }}
          _CONTABO_CLIENT_ID: ${{ secrets.CONTABO_CLIENT_ID }}
          _CONTABO_CLIENT_SECRET: ${{ secrets.CONTABO_CLIENT_SECRET }}
          _CONTABO_API_USERNAME: ${{ secrets.CONTABO_API_USERNAME }}
          _CONTABO_API_PASSWORD: ${{ secrets.CONTABO_API_PASSWORD }}
        run: |
          # Tier 1 (frontend) + Tier 3 (SSH/Contabo for ERP VPS deployment)
          REQUIRED_SECRETS="REGISTRY_USERNAME REGISTRY_PASSWORD REGISTRY_EMAIL KUBE_CONFIG SSH_HOST SSH_USER SSH_PRIVATE_KEY DOCKER_SSH_KEY CONTABO_CLIENT_ID CONTABO_CLIENT_SECRET CONTABO_API_USERNAME CONTABO_API_PASSWORD"

          # Step 1: Delete any secrets that exist but have empty values.
          # gh secret list reports empty-value secrets as "existing", so the
          # name-only check passes but deployment fails with empty values.
          # By deleting them, the existence check below will find them missing
          # and trigger the devops-k8s sync to recreate them with real values.
          echo "Checking for empty-valued secrets..."
          EXISTING=$(gh secret list --repo "${{ github.repository }}" --json name -q '.[].name' 2>/dev/null || echo "")
          for secret in $REQUIRED_SECRETS; do
            env_var="_${secret}"
            value="${!env_var}"
            if echo "$EXISTING" | grep -qx "$secret" && [ -z "$value" ]; then
              echo "  Deleting $secret (exists but empty)"
              gh secret delete "$secret" --repo "${{ github.repository }}" 2>/dev/null || true
            fi
          done

          # Step 2: Re-check which secrets actually exist with values
          echo ""
          echo "Checking which deployment secrets exist..."
          EXISTING=$(gh secret list --repo "${{ github.repository }}" --json name -q '.[].name' 2>/dev/null || echo "")

          MISSING=()
          for secret in $REQUIRED_SECRETS; do
            if echo "$EXISTING" | grep -qx "$secret"; then
              echo "  $secret"
            else
              echo "  $secret -- missing"
              MISSING+=("$secret")
            fi
          done

          echo ""
          if [ ${#MISSING[@]} -eq 0 ]; then
            echo "All secrets already exist -- skipping sync"
            echo "result=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi

          MISSING_LIST="${MISSING[*]}"
          echo "${#MISSING[@]} secret(s) need syncing: $MISSING_LIST"
          echo ""

          # Trigger devops-k8s sync for ONLY the missing secrets
          echo "Triggering devops-k8s/sync-secrets.yml..."
          gh workflow run sync-secrets.yml \
            --repo Bengo-Hub/devops-k8s \
            --ref main \
            -f target_repo="${{ github.repository }}" \
            -f secrets="$MISSING_LIST"

          # Wait for the missing secrets to appear (max 3 min)
          echo "Waiting for secrets to be synced..."
          for i in $(seq 1 18); do
            sleep 10
            CURRENT=$(gh secret list --repo "${{ github.repository }}" --json name -q '.[].name' 2>/dev/null || echo "")
            STILL_MISSING=0
            for secret in "${MISSING[@]}"; do
              echo "$CURRENT" | grep -qx "$secret" || STILL_MISSING=$((STILL_MISSING + 1))
            done
            if [ $STILL_MISSING -eq 0 ]; then
              echo "All ${#MISSING[@]} secrets synced after $((i * 10))s"
              echo "result=synced" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "  ${STILL_MISSING} still missing ($((i * 10))s)..."
          done

          echo "Timeout -- some secrets may not have synced"
          echo "result=partial" >> $GITHUB_OUTPUT

  deploy:
    needs: sync-secrets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
    - name: Re-trigger if secrets were just synced
      if: needs.sync-secrets.outputs.result == 'synced'
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}
      run: |
        echo "Secrets were just synced in this workflow run."
        echo "GitHub loads secret values at job start — newly created secrets"
        echo "are not available until the next run."
        echo ""
        echo "Re-triggering workflow so the deploy job picks up the new values..."
        gh workflow run deploy.yml --repo "${{ github.repository }}" --ref "${{ github.ref }}"
        echo "Workflow re-triggered. This run will exit gracefully."
        exit 0

    - name: Abort if sync was partial
      if: needs.sync-secrets.outputs.result == 'partial'
      run: |
        echo "Secret sync timed out — some secrets may not have been created."
        echo "Check the devops-k8s sync-secrets workflow run for errors:"
        echo "  https://github.com/Bengo-Hub/devops-k8s/actions"
        exit 1

    - name: Checkout code
      if: needs.sync-secrets.outputs.result != 'synced'
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      if: needs.sync-secrets.outputs.result != 'synced'
      uses: docker/setup-buildx-action@v3

    - name: Install DevOps Tools
      if: needs.sync-secrets.outputs.result != 'synced'
      uses: Bengo-Hub/devops-k8s/.github/actions/install-devops-tools@main

    - name: Set deployment variables
      if: needs.sync-secrets.outputs.result != 'synced'
      run: |
        echo "DEPLOY=true" >> $GITHUB_ENV
        echo "SETUP_DATABASES=false" >> $GITHUB_ENV
        echo "DB_TYPES=postgres,redis" >> $GITHUB_ENV
        echo "NAMESPACE=erp" >> $GITHUB_ENV
        echo "ENV_SECRET_NAME=erp-ui-env" >> $GITHUB_ENV
        echo "REGISTRY_SERVER=docker.io" >> $GITHUB_ENV
        echo "REGISTRY_NAMESPACE=codevertex" >> $GITHUB_ENV
        echo "VALUES_FILE_PATH=apps/erp-ui/values.yaml" >> $GITHUB_ENV
        echo "DEPLOYMENT_SUMMARY_TITLE=BengoERP UI Deployment Summary" >> $GITHUB_ENV
        echo "DEPLOYMENT_SUCCESS_MESSAGE=BengoERP UI deployment completed! The UI should be accessible via the URLs above." >> $GITHUB_ENV
        echo "APPLICATION_DISPLAY_NAME=BengoERP UI" >> $GITHUB_ENV
        echo "VITE_API_URL=https://erpapi.masterspace.co.ke" >> $GITHUB_ENV
        echo "VITE_WEBSOCKET_URL=wss://erpapi.masterspace.co.ke/ws/pos/" >> $GITHUB_ENV

    - name: Debug available secrets
      if: needs.sync-secrets.outputs.result != 'synced'
      run: |
        echo "Checking which tokens are available..."
        [[ -n "${{ secrets.GH_PAT }}" ]] && echo "✅ GH_PAT is set" || echo "❌ GH_PAT not found"
        [[ -n "${{ secrets.GITHUB_TOKEN }}" ]] && echo "✅ GITHUB_TOKEN is set (default, may lack cross-repo write)" || echo "❌ GITHUB_TOKEN not found"
        echo "Note: GH_PAT required for cross-repo push to devops-k8s"

    - name: Verify secrets
      if: needs.sync-secrets.outputs.result != 'synced'
      run: |
        echo "Verifying deployment secrets..."
        echo "Sync result: ${{ needs.sync-secrets.outputs.result }}"
        echo ""
        FAIL=0

        check_secret() {
          local name="$1" min_len="$2" value="$3"
          if [[ -z "$value" ]]; then
            echo "❌ $name — empty"
            FAIL=1
          elif [[ ${#value} -lt $min_len ]]; then
            echo "⚠️  $name — ${#value} chars (need >=$min_len)"
            FAIL=1
          else
            echo "✅ $name (${#value} chars)"
          fi
        }

        check_secret "REGISTRY_USERNAME"  5    "$REGISTRY_USERNAME"
        check_secret "REGISTRY_PASSWORD"  20   "$REGISTRY_PASSWORD"
        check_secret "KUBE_CONFIG"        1000 "$KUBE_CONFIG"

        if [[ $FAIL -eq 1 ]]; then
          echo ""
          echo "❌ Secret verification failed!"
          echo ""
          echo "Possible causes:"
          echo "  1. Secrets were just synced in this workflow run."
          echo "     GitHub loads secrets when each job STARTS."
          echo "     If sync-secrets just created them, re-run this workflow."
          echo ""
          echo "  2. devops-k8s PROPAGATE_PAT may lack write access."
          echo "     Check: https://github.com/Bengo-Hub/devops-k8s/actions"
          echo ""
          echo "  3. Corrupted repo-level secret overriding correct value."
          echo "     Fix: delete the bad secret, then re-run:"
          echo "     gh secret delete <NAME> --repo ${{ github.repository }}"
          exit 1
        fi

        echo ""
        echo "✅ All secrets verified"
      env:
        REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}

    - name: Run production deployment
      if: needs.sync-secrets.outputs.result != 'synced'
      env:
        DOCKER_SSH_KEY: ${{ secrets.DOCKER_SSH_KEY }}
        KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        # Use GH token for HTTPS auth fallback in build.sh
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_PAT: ${{ secrets.GH_PAT }}
        GITHUB_SECRET: ${{ secrets.GITHUB_SECRET }}
        REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        GITHUB_SHA: ${{ github.sha }}
        DEPLOY: true
        SETUP_DATABASES: false
        DB_TYPES: postgres,redis
        NAMESPACE: erp
        ENV_SECRET_NAME: erp-ui-env
        REGISTRY_SERVER: docker.io
        REGISTRY_NAMESPACE: codevertex
        VALUES_FILE_PATH: apps/erp-ui/values.yaml
        GIT_USER: ${{ secrets.GIT_USER }}
        GIT_EMAIL: ${{ secrets.GIT_EMAIL }}
        # Vite build-time environment variables for API configuration
        VITE_API_URL: https://erpapi.masterspace.co.ke
        VITE_WEBSOCKET_URL: wss://erpapi.masterspace.co.ke/ws/pos/
        # SSH deployment variables
        SSH_HOST: ${{ secrets.SSH_HOST }}
        SSH_USER: ${{ secrets.SSH_USER }}
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        PROVIDER: contabo
        CONTABO_API: true
        # Contabo secrets
        CONTABO_CLIENT_ID: ${{ secrets.CONTABO_CLIENT_ID }}
        CONTABO_CLIENT_SECRET: ${{ secrets.CONTABO_CLIENT_SECRET }}
        CONTABO_API_USERNAME: ${{ secrets.CONTABO_API_USERNAME }}
        CONTABO_API_PASSWORD: ${{ secrets.CONTABO_API_PASSWORD }}
        # Deployment variables
        DEPLOYMENT_SUMMARY_TITLE: BengoERP UI Deployment Summary
        DEPLOYMENT_SUCCESS_MESSAGE: BengoERP UI deployment completed! The UI should be accessible via the URLs above.
        APPLICATION_DISPLAY_NAME: BengoERP UI
      run: |
        chmod +x build.sh
        ./build.sh

    - name: Tag and push :latest
      if: success() && needs.sync-secrets.outputs.result != 'synced'
      env:
        REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      run: |
        set -e
        : "${REGISTRY_SERVER:=docker.io}"
        : "${REGISTRY_NAMESPACE:=codevertex}"
        IMAGE_REPO="${REGISTRY_SERVER}/${REGISTRY_NAMESPACE}/erp-ui"
        SHORT_SHA=${GITHUB_SHA::8}
        echo "Tagging ${IMAGE_REPO}:${SHORT_SHA} as :latest and pushing"
        echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_SERVER" -u "$REGISTRY_USERNAME" --password-stdin
        # Ensure the commit-tagged image is available locally
        docker pull "${IMAGE_REPO}:${SHORT_SHA}" || true
        docker tag "${IMAGE_REPO}:${SHORT_SHA}" "${IMAGE_REPO}:latest"
        docker push "${IMAGE_REPO}:latest"
